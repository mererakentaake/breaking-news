name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache: "npm" — requires a committed package-lock.json.
          # node_modules are cached manually below instead.

      # ── 3. Cache node_modules ────────────────────────────────
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      # ── 4. Java (required by Gradle / Android SDK) ──────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 5. Android SDK ──────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. Install dependencies ─────────────────────────────
      - name: Install Node dependencies
        # Skipped on full node_modules cache hit.
        # Uses npm install (not npm ci) — no lockfile required.
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install

      # ── 7. Build web assets (Vite) ──────────────────────────
      - name: Build web assets
        run: npm run build

      # ── 8. Capacitor sync → copies dist into android/ ───────
      # @capacitor/cli is now in devDependencies so `cap` is available
      # via the local node_modules/.bin path that npx resolves.
      - name: Capacitor sync
        run: npx cap sync android

      # ── 9. Generate Android icons & splash screens ───────────
      # Reads resources/icon.png (1024x1024) and resources/splash.png
      # and writes all required mipmap / drawable sizes into android/.
      - name: Generate icons and splash screens
        run: npx capacitor-assets generate --android

      # ── 10. Cache Gradle dependencies ───────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 11a. Decode keystore (only on push/tag, not PRs) ─────
      - name: Decode keystore
        if: github.event_name != 'pull_request' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      # ── 11b. Build signed release APK ───────────────────────
      - name: Build release APK (signed)
        if: github.event_name != 'pull_request' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # ── 11c. Build debug APK (PRs or no keystore secrets) ───
      - name: Build debug APK
        if: github.event_name == 'pull_request' || env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: android
        run: ./gradlew assembleDebug

      # ── 12. Rename APK to breaking-news.apk ─────────────────
      - name: Rename APK
        run: |
          for variant in release debug; do
            APK=$(find android/app/build/outputs/apk/$variant -name "*.apk" 2>/dev/null | head -1)
            if [ -n "$APK" ]; then
              mv "$APK" "$(dirname $APK)/breaking-news.apk"
              echo "Renamed $variant APK to breaking-news.apk"
            fi
          done

      # ── 13. Upload APK artifact ─────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: breaking-news-apk
          path: |
            android/app/build/outputs/apk/release/breaking-news.apk
            android/app/build/outputs/apk/debug/breaking-news.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 14. Create GitHub Release on version tags ────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/breaking-news.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
